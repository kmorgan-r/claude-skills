name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize]
    # Optional: Only run on specific file changes
    # paths:
    #   - "src/**/*.ts"
    #   - "src/**/*.tsx"
    #   - "src/**/*.js"
    #   - "src/**/*.jsx"

# Prevent race conditions when multiple PRs trigger simultaneously
concurrency:
  group: claude-review-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  claude-review:
    # Optional: Filter by PR author
    # if: |
    #   github.event.pull_request.user.login == 'external-contributor' ||
    #   github.event.pull_request.user.login == 'new-developer' ||
    #   github.event.pull_request.author_association == 'FIRST_TIME_CONTRIBUTOR'

    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Review ONLY the changes in this PR. Start by running `gh pr diff ${{ github.event.pull_request.number }}` to get the diff, then ONLY review the files and lines that were changed. Do NOT review files that are not part of this PR's diff.

            Report ONLY CRITICAL and HIGH severity issues found in the PR diff:

            ## Review areas:
            - **Code quality**: Violations of patterns in CLAUDE.md, anti-patterns that cause maintenance nightmares
            - **Bugs**: Logic errors, null pointer risks, race conditions, incorrect error handling
            - **Performance**: O(n²) in hot paths, memory leaks, missing pagination on large datasets
            - **Security**: Injection, auth bypass, data exposure, secrets in code, XSS, CSRF
            - **Test coverage**: Critical paths with no tests, tests that don't actually assert anything

            ## Severity guide:
            - **CRITICAL**: Will cause security breach, data loss, or production outage
            - **HIGH**: Will cause bugs, crashes, or significant user impact
            - **MEDIUM/LOW**: Style preferences, minor improvements, "nice to have" → DO NOT REPORT

            ## How to report:
            Write your complete review to a file called `review.md` in the repo root.
            Include file paths and line numbers for each issue (e.g., `src/file.ts:45`).
            If no critical/high issues found, write: "✅ No critical issues found"

            IMPORTANT: Only review files shown in the PR diff. Do NOT review unrelated files in the repository.
            Use CLAUDE.md for project conventions. Do NOT run npm, npx, or any build/test commands. Static review only.

          claude_args: '--allowed-tools "Write,Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr list:*),Bash(gh issue view:*),Bash(gh search:*),Bash(gh issue list:*)"'

      - name: Post review comment
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -f review.md ]; then
            gh pr comment ${{ github.event.pull_request.number }} --body-file review.md
          fi
